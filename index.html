<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Invest - iOS Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --matrix: #00ff41; --ios-blue: #007aff; --glass: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        /* Hiệu ứng Matrix Nền */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://i.makeagif.com/media/12-29-2015/v-3AnS.gif');
            background-size: cover; z-index: -1;
        }

        header {
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(15, 15, 15, 0.7); display: flex; justify-content: space-between; align-items: center;
        }

        .balance-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; padding: 30px 20px; margin: 20px; text-align: center;
            backdrop-filter: blur(15px);
        }

        .container { padding: 0 20px 100px 20px; max-width: 500px; margin: auto; }
        
        /* Gói đầu tư */
        .glass-card {
            background: var(--glass); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { 
            height: 100%; background: var(--matrix); width: 0%; 
            box-shadow: 0 0 10px var(--matrix); transition: 1s; 
        }

        .btn-main {
            background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer;
        }

        /* Modal iOS */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; transition: 0.4s;
            display: flex; align-items: flex-end;
        }
        .modal.active { bottom: 0; }
        .modal-content {
            background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(25px);
            width: 100%; padding: 30px 20px; border-radius: 30px 30px 0 0;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 700; color: var(--matrix)">MATRIX.IO</div>
    <div onclick="toggleModal('userModal')" style="cursor:pointer">👤</div>
</header>

<div class="container">
    <div class="balance-card">
        <p style="opacity: 0.6; font-size: 13px;">Số dư khả dụng</p>
        <h1 id="balance" style="font-size: 36px; margin: 10px 0;">0đ</h1>
        <div style="display:flex; gap: 10px; justify-content: center; margin-top: 10px;">
            <button onclick="location.href='nap-tien.html'" style="background: var(--ios-blue); color: #fff; border:none; padding: 8px 20px; border-radius: 20px;">Nạp</button>
            <button onclick="location.href='rut-tien.html'" style="background: var(--glass); color: #fff; border:1px solid #fff; padding: 8px 20px; border-radius: 20px;">Rút</button>
        </div>
    </div>

    <h3 style="margin-bottom:15px">Gói đã đầu tư</h3>
    <div id="myPackages"></div>

    <h3 style="margin: 25px 0 15px 0">Cơ hội mới</h3>
    <div id="shop">
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; font-weight:700">
                <span>Gói STARTER</span>
                <span style="color:var(--matrix)">60.000đ</span>
            </div>
            <p style="font-size:12px; opacity:0.6; margin: 5px 0">Lãi 10k/ngày - Chu kỳ 30 ngày</p>
            <button class="btn-main" onclick="buyPkg(60000, 10000, 'STARTER')">Đầu tư</button>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center">Thông tin tài khoản</h3>
        <p id="uEmail" style="text-align:center; margin: 15px 0; opacity:0.7"></p>
        <button class="btn-main" style="background:#ff3b30; color:#fff" onclick="logout()">Đăng xuất</button>
        <button class="btn-main" style="margin-top:10px; background:none; color:#fff" onclick="toggleModal('userModal')">Đóng</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { /* DÁN CONFIG CỦA BẠN VÀO ĐÂY */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    auth.onAuthStateChanged(user => {
        if(!user) return location.href = "login.html";
        currentUser = user;
        document.getElementById('uEmail').innerText = user.email;
        loadData();
    });

    function loadData() {
        // Real-time Balance
        db.collection("users").doc(currentUser.uid).onSnapshot(doc => {
            if(doc.exists) document.getElementById('balance').innerText = doc.data().balance.toLocaleString() + "đ";
        });

        // Real-time Packages + Progress Bar
        db.collection("packages").where("uid", "==", currentUser.uid).onSnapshot(snap => {
            const list = document.getElementById('myPackages');
            list.innerHTML = snap.empty ? "<p style='opacity:0.5'>Chưa có gói nào.</p>" : "";
            snap.forEach(doc => {
                const p = doc.data();
                const start = p.createdAt?.toDate() || new Date();
                const elapsed = (new Date() - start) / (30 * 24 * 60 * 60 * 1000);
                const percent = Math.min(Math.round(elapsed * 100), 100);

                list.innerHTML += `
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; font-size:14px">
                            <b>${p.name}</b>
                            <span>${percent}%</span>
                        </div>
                        <div class="progress-bg"><div class="progress-bar" style="width:${percent}%"></div></div>
                    </div>
                `;
            });
        });
    }

    async function buyPkg(price, daily, name) {
        if(!confirm("Xác nhận đầu tư?")) return;
        const ref = db.collection("users").doc(currentUser.uid);
        const uDoc = await ref.get();
        if(uDoc.data().balance < price) return alert("Số dư không đủ");

        await db.runTransaction(async (t) => {
            t.update(ref, { balance: uDoc.data().balance - price });
            t.set(db.collection("packages").doc(), {
                uid: currentUser.uid, name: name, price: price, daily: daily,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        alert("Thành công!");
    }

    function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
