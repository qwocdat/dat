<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Invest - iOS Liquid Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --matrix-green: #00ff41;
            --ios-blue: #007aff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #000;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://i.makeagif.com/media/12-29-2015/v-3AnS.gif'); /* Hiệu ứng Matrix nền */
            background-size: cover;
            background-attachment: fixed;
        }

        /* Liquid Glass Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(20, 20, 20, 0.7);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 700; font-size: 20px; color: var(--matrix-green); text-shadow: 0 0 10px var(--matrix-green); }

        .profile-icon {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--glass); display: flex; align-items: center;
            justify-content: center; border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Balance Card iOS Style */
        .balance-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .balance-card span { font-size: 14px; opacity: 0.7; }
        .balance-card h2 { font-size: 32px; margin: 10px 0; letter-spacing: -1px; }

        /* Investment Cards */
        .section-title { font-size: 18px; margin-bottom: 15px; font-weight: 600; padding-left: 5px; }
        
        .package-grid { display: grid; gap: 15px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .glass-card:active { transform: scale(0.95); }

        .pkg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .pkg-name { font-weight: 600; color: var(--matrix-green); }
        .pkg-price { font-size: 18px; font-weight: 700; }

        /* Progress Bar */
        .progress-container {
            background: rgba(255,255,255,0.1);
            height: 6px; border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--matrix-green), #00ffc2);
            box-shadow: 0 0 10px var(--matrix-green);
            transition: width 1s ease;
        }

        .btn-buy {
            background: white; color: black; border: none;
            padding: 12px; width: 100%; border-radius: 12px;
            font-weight: 700; cursor: pointer;
        }

        /* Modal iOS Style */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; transition: 0.4s;
            display: flex; align-items: flex-end;
        }
        .modal.active { bottom: 0; }

        .modal-content {
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(25px);
            width: 100%; padding: 30px 20px;
            border-radius: 30px 30px 0 0;
            border-top: 0.5px solid rgba(255,255,255,0.2);
        }

        .user-info-item {
            display: flex; justify-content: space-between;
            padding: 15px 0; border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .btn-logout { color: #ff3b30; font-weight: 600; margin-top: 20px; text-align: center; cursor: pointer; }

    </style>
</head>
<body>

<header>
    <div class="logo">MATRIX.IO</div>
    <div class="profile-icon" onclick="toggleModal('userModal')">👤</div>
</header>

<div class="container">
    <div class="balance-card">
        <span>Số dư khả dụng</span>
        <h2 id="balance">0</h2>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
            <button onclick="location.href='nap-tien.html'" style="padding: 5px 15px; border-radius: 20px; border: none; background: var(--ios-blue); color: white;">Nạp</button>
            <button onclick="location.href='rut-tien.html'" style="padding: 5px 15px; border-radius: 20px; border: 1px solid white; background: none; color: white;">Rút</button>
        </div>
    </div>

    <h3 class="section-title">Gói đầu tư của bạn</h3>
    <div id="myPackages" class="package-grid">
        </div>

    <h3 class="section-title" style="margin-top: 30px;">Cơ hội đầu tư</h3>
    <div class="package-grid">
        <div class="glass-card">
            <div class="pkg-header">
                <span class="pkg-name">STARTER</span>
                <span class="pkg-price">60,000đ</span>
            </div>
            <p style="font-size: 13px; opacity: 0.7;">Lãi 10,000đ / ngày trong 30 ngày</p>
            <button class="btn-buy" onclick="buyPackage(60000, 10000, 'STARTER')">Đầu tư ngay</button>
        </div>

        <div class="glass-card">
            <div class="pkg-header">
                <span class="pkg-name">PREMIUM</span>
                <span class="pkg-price">300,000đ</span>
            </div>
            <p style="font-size: 13px; opacity: 0.7;">Lãi 31,000đ / ngày trong 30 ngày</p>
            <button class="btn-buy" onclick="buyPackage(300000, 31000, 'PREMIUM')">Đầu tư ngay</button>
        </div>
    </div>
</div>

<div id="userModal" class="modal" onclick="if(event.target == this) toggleModal('userModal')">
    <div class="modal-content">
        <h3 style="text-align: center; margin-bottom: 20px;">Tài khoản</h3>
        <div class="user-info-item">
            <span>Email</span>
            <span id="userEmail">...</span>
        </div>
        <div class="user-info-item">
            <span>ID Người dùng</span>
            <span id="userUID" style="font-size: 10px; opacity: 0.5;">...</span>
        </div>
        <div class="btn-logout" onclick="logout()">Đăng xuất</div>
        <button class="btn-buy" style="margin-top: 20px; background: var(--glass); color: white;" onclick="toggleModal('userModal')">Đóng</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8",
        authDomain: "kiemtien-849fa.firebaseapp.com",
        projectId: "kiemtien-849fa",
        storageBucket: "kiemtien-849fa.appspot.com",
        messagingSenderId: "517559162898",
        appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    auth.onAuthStateChanged(user => {
        if (!user) return window.location.href = "login.html";
        currentUser = user;
        document.getElementById("userEmail").innerText = user.email;
        document.getElementById("userUID").innerText = user.uid;
        loadData();
    });

    function loadData() {
        // Load số dư
        db.collection("users").doc(currentUser.uid).onSnapshot(doc => {
            if(doc.exists) document.getElementById("balance").innerText = doc.data().balance.toLocaleString() + " VNĐ";
        });

        // Load gói đã mua & tính thanh tiến trình
        db.collection("packages").where("uid", "==", currentUser.uid).onSnapshot(snap => {
            const container = document.getElementById("myPackages");
            container.innerHTML = "";
            if(snap.empty) container.innerHTML = "<p style='opacity:0.5; font-size:13px;'>Bạn chưa có gói đầu tư nào.</p>";

            snap.forEach(doc => {
                const p = doc.data();
                const startTime = p.createdAt?.toDate() || new Date();
                const now = new Date();
                
                // Tính toán phần trăm (30 ngày = 2,592,000,000 ms)
                const duration = 30 * 24 * 60 * 60 * 1000;
                const elapsed = now - startTime;
                const percent = Math.min(Math.round((elapsed / duration) * 100), 100);

                container.innerHTML += `
                    <div class="glass-card">
                        <div class="pkg-header">
                            <span class="pkg-name">● ${p.packageName}</span>
                            <span style="font-size:12px">${percent}%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${percent}%"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:11px; opacity:0.6">
                            <span>Ngày mua: ${startTime.toLocaleDateString()}</span>
                            <span>Hết hạn: 30 ngày</span>
                        </div>
                    </div>
                `;
            });
        });
    }

    async function buyPackage(price, daily, name) {
        if(!confirm(`Xác nhận đầu tư gói ${name} (${price.toLocaleString()}đ)?`)) return;

        const userRef = db.collection("users").doc(currentUser.uid);
        const doc = await userRef.get();
        const bal = doc.data().balance;

        if(bal < price) return alert("Không đủ tiền!");

        await db.runTransaction(async (transaction) => {
            transaction.update(userRef, { balance: bal - price });
            transaction.set(db.collection("packages").doc(), {
                uid: currentUser.uid,
                packageName: name,
                price: price,
                daily: daily,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        alert("Đầu tư thành công!");
    }

    function toggleModal(id) {
        document.getElementById(id).classList.toggle('active');
    }

    function logout() {
        auth.signOut().then(() => window.location.reload());
    }
</script>
</body>
</html>
