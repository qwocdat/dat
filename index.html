<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Matrix Investment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #00ff41; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .balance { font-size: 30px; color: #00ff41; font-weight: bold; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-buy { background: #fff; color: #000; }
        .btn-nav { background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <p>Số dư của bạn:</p>
        <div class="balance" id="userBalance">0đ</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-nav" onclick="location.href='nap-tien.html'">Nạp tiền</button>
            <button class="btn btn-nav" onclick="location.href='rut-tien.html'">Rút tiền</button>
        </div>
    </div>

    <div class="card">
        <h3>Gói Khởi Đầu</h3>
        <p>Giá: <b>60.000đ</b></p>
        <p>Lợi nhuận: <b>8.000đ/ngày</b></p>
        <button class="btn btn-buy" onclick="buy(60000, 8000, 'Gói 60k')">Đầu tư ngay</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if(!user) return window.location.href='dangnhap.html';
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                if(doc.exists) document.getElementById('userBalance').innerText = (doc.data().balance || 0).toLocaleString() + "đ";
            });
        });

        async function buy(price, profit, name) {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            try {
                await db.runTransaction(async (t) => {
                    const doc = await t.get(userRef);
                    const bal = doc.data().balance || 0;
                    if(bal < price) throw "Số dư không đủ!";
                    t.update(userRef, { balance: bal - price });
                    t.set(db.collection("packages").doc(), { uid: user.uid, name, price, profit, createdAt: new Date() });
                });
                alert("Mua thành công!");
            } catch(e) { alert(e); }
        }
    </script>
</body>
</html>
