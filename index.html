<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jiray</title></title>
    <style>
        :root { --m: #00ff41; --g: rgba(255, 255, 255, 0.08); }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        header { padding: 20px; display: flex; justify-content: space-between; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; background: rgba(0,0,0,0.5); }
        .card { background: var(--g); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin: 15px; backdrop-filter: blur(15px); }
        .btn-buy { background: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--m); width: 0%; box-shadow: 0 0 10px var(--m); transition: 1s; }
    </style>
</head>
<body>
    <header>
        <div style="color:var(--m); font-weight:700">MATRIX.IO</div>
        <div onclick="firebase.auth().signOut().then(()=>location.reload())" style="cursor:pointer; font-size:12px; opacity:0.7">Đăng xuất</div>
    </header>
    <div class="card" style="text-align:center">
        <p style="opacity:0.6; font-size:12px">Số dư khả dụng</p>
        <h1 id="bal">0đ</h1>
        <div style="display:flex; gap:10px; justify-content:center">
            <button onclick="location.href='nap-tien.html'" style="background:var(--m); border:none; padding:10px 25px; border-radius:20px; font-weight:700; cursor:pointer">Nạp tiền</button>
            <button onclick="location.href='rut-tien.html'" style="background:none; border:1px solid #fff; color:#fff; padding:10px 25px; border-radius:20px; cursor:pointer">Rút tiền</button>
        </div>
    </div>
    <div style="padding: 0 15px">
        <h3 style="margin-left:15px">Gói đầu tư</h3>
        <div class="card">
            <b>LEVEL 1</b> <span style="float:right; color:var(--m)">50.000đ</span>
            <p style="font-size:12px; opacity:0.6">Lãi 5.000đ/ngày (30 ngày)</p>
            <button class="btn-buy" onclick="buy(50000, 5000, 'LEVEL 1')">Đầu tư</button>
        </div>
        <div class="card">
            <b>LEVEL 2</b> <span style="float:right; color:var(--m)">200.000đ</span>
            <p style="font-size:12px; opacity:0.6">Lãi 25.000đ/ngày (30 ngày)</p>
            <button class="btn-buy" onclick="buy(200000, 25000, 'LEVEL 2')">Đầu tư</button>
        </div>
        <div class="card">
            <b>LEVEL 3</b> <span style="float:right; color:var(--m)">1.000.000đ</span>
            <p style="font-size:12px; opacity:0.6">Lãi 150.000đ/ngày (30 ngày)</p>
            <button class="btn-buy" onclick="buy(1000000, 150000, 'LEVEL 3')">Đầu tư</button>
        </div>
        <h3 style="margin-left:15px">Máy đang chạy</h3>
        <div id="activePkg"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let uid, userBal;
        firebase.auth().onAuthStateChanged(u => {
            if(!u) return location.href = "dangnhap.html";
            uid = u.uid;
            db.collection("users").doc(uid).onSnapshot(d => {
                userBal = d.data().balance;
                document.getElementById('bal').innerText = userBal.toLocaleString() + "đ";
            });
            db.collection("packages").where("uid", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('activePkg');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const percent = Math.min(Math.round(((new Date() - p.createdAt.toDate()) / (30*24*60*60*1000)) * 100), 100);
                    div.innerHTML += `<div class="card"><b>${p.name}</b> <span style="float:right">${percent}%</span><div class="progress-bg"><div class="progress-bar" style="width:${percent}%"></div></div></div>`;
                });
            });
        });
        async function buy(p, d, n) {
            if(userBal < p) return alert("Không đủ tiền");
            if(!confirm("Xác nhận đầu tư gói " + n + "?")) return;
            const ref = db.collection("users").doc(uid);
            await db.runTransaction(async t => {
                t.update(ref, { balance: userBal - p });
                t.set(db.collection("packages").doc(), { uid, name: n, price: p, daily: d, createdAt: new Date() });
            });
            alert("Thành công!");
        }
    </script>
</body>
</html>
