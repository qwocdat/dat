<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp tiền</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        select, button { width: 100%; padding: 15px; border-radius: 12px; margin: 10px 0; border: none; font-weight: 700; cursor: pointer; }
        #qrImg { width: 100%; max-width: 250px; border: 8px solid #fff; border-radius: 15px; margin: 20px 0; display: none; }
    </style>
</head>
<body>
    <div class="glass">
        <h2 style="color:#00ff41">NẠP TIỀN</h2>
        <p style="font-size:12px; opacity:0.6">Chọn số tiền nạp để tạo mã QR</p>
        <select id="amt" onchange="genQR()">
            <option value="50000">50.000đ</option>
            <option value="100000">100.000đ</option>
            <option value="200000">200.000đ</option>
            <option value="500000">500.000đ</option>
            <option value="1000000">1.000.000đ</option>
        </select>
        <img id="qrImg">
        <p id="memo" style="font-weight:700; color:#00ff41"></p>
        <button onclick="send()" style="background:#00ff41">Tôi đã chuyển khoản</button>
        <button onclick="location.href='index.html'" style="background:none; color:#fff">Quay lại</button>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let user;
        firebase.auth().onAuthStateChanged(u => { if(!u) return; user = u; genQR(); });
        function genQR() {
            const a = document.getElementById('amt').value;
            const m = "NAP " + user.uid.substring(0,6).toUpperCase();
            document.getElementById('memo').innerText = "Nội dung: " + m;
            document.getElementById('qrImg').src = `https://img.vietqr.io/image/vpbank-0989249990-compact2.png?amount=${a}&addInfo=${m}&accountName=NGUYEN DAI QUOC DAT`;
            document.getElementById('qrImg').style.display = "inline-block";
        }
        async function send() {
            await db.collection("deposits").add({ uid: user.uid, email: user.email, amount: parseInt(document.getElementById('amt').value), status: "pending", createdAt: new Date() });
            alert("Đã gửi thông báo! Vui lòng chờ admin duyệt.");
            location.href = "index.html";
        }
    </script>
</body>
</html>
