<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palantir - Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #1a1a2e;
      color: #fff;
    }

    .admin-header {
      background: #16213e;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #00b894;
    }

    .admin-stats {
      display: flex;
      gap: 30px;
    }

    .stat-box {
      background: #0f3460;
      padding: 10px 20px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: #00b894;
    }

    .stat-label {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .container {
      max-width: 1400px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      background: #16213e;
      padding: 12px 30px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .tab.active {
      background: #00b894;
      color: #16213e;
    }

    .tab:hover {
      background: #0f3460;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: #16213e;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .card-title {
      font-size: 1.3rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #00b894;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 15px;
      background: #0f3460;
      color: #00b894;
      font-weight: 600;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #0f3460;
    }

    tr:hover {
      background: #1a1a2e;
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status-pending {
      background: #f39c12;
      color: #fff;
    }

    .status-success {
      background: #00b894;
      color: #fff;
    }

    .status-cancelled {
      background: #e74c3c;
      color: #fff;
    }

    .btn {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
      margin: 0 3px;
    }

    .btn-success {
      background: #00b894;
      color: white;
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
    }

    .btn-info {
      background: #3498db;
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .filter-bar {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-input {
      background: #0f3460;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      color: white;
      flex: 1;
      min-width: 200px;
    }

    .filter-input::placeholder {
      color: #999;
    }

    .total-box {
      background: #00b894;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .total-box .label {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .total-box .value {
      font-size: 2rem;
      font-weight: bold;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #16213e;
      border-radius: 15px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
    }

    .modal-title {
      font-size: 1.5rem;
      color: #00b894;
      margin-bottom: 20px
