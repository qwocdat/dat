<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        button { padding: 5px 10px; cursor: pointer; background: #28a745; color: #fff; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Yêu cầu nạp tiền</h2>
    <table id="depositTable">
        <tr><th>Email</th><th>Số tiền</th><th>Duyệt</th></tr>
    </table>

    <h2>Yêu cầu rút tiền</h2>
    <table id="withdrawTable">
        <tr><th>Email</th><th>Số tiền</th><th>Ngân hàng</th><th>Xong</th></tr>
    </table>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load nạp tiền
        db.collection("deposits").where("status", "==", "pending").onSnapshot(snap => {
            const table = document.getElementById('depositTable');
            table.innerHTML = "<tr><th>Email</th><th>Số tiền</th><th>Duyệt</th></tr>";
            snap.forEach(doc => {
                const d = doc.data();
                table.innerHTML += `<tr><td>${d.email}</td><td>${d.amount}</td><td><button onclick="duyetNap('${doc.id}', '${d.uid}', ${d.amount})">Duyệt</button></td></tr>`;
            });
        });

        // Load rút tiền
        db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
            const table = document.getElementById('withdrawTable');
            table.innerHTML = "<tr><th>Email</th><th>Số tiền</th><th>Ngân hàng</th><th>Xong</th></tr>";
            snap.forEach(doc => {
                const d = doc.data();
                table.innerHTML += `<tr><td>${d.email}</td><td>${d.amount}</td><td>${d.bank}</td><td><button onclick="duyetRut('${doc.id}')">Xong</button></td></tr>`;
            });
        });

        async function duyetNap(id, uid, amt) {
            const userRef = db.collection("users").doc(uid);
            await db.runTransaction(async t => {
                const u = await t.get(userRef);
                t.update(userRef, { balance: (u.data().balance || 0) + amt });
                t.update(db.collection("deposits").doc(id), { status: "done" });
            });
            alert("Đã duyệt nạp!");
        }

        async function duyetRut(id) {
            await db.collection("withdrawals").doc(id).update({ status: "done" });
            alert("Đã duyệt rút!");
        }
    </script>
</body>
</html>
