<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .tab { display: inline-block; padding: 10px 20px; background: #ccc; cursor: pointer; border-radius: 5px 5px 0 0; }
        .tab.active { background: #007aff; color: #fff; }
        .content { display: none; background: #fff; padding: 20px; border: 1px solid #ccc; }
        .content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        button { cursor: pointer; padding: 5px 10px; background: #00ff41; border: none; font-weight: 700; }
    </style>
</head>
<body>
    <h2>MATRIX ADMIN</h2>
    <div class="tab active" onclick="tab(0)">Duyệt Nạp</div>
    <div class="tab" onclick="tab(1)">Duyệt Rút</div>
    <div class="tab" onclick="tab(2)">Thành Viên</div>
    <div id="c0" class="content active"><table><tbody id="t0"></tbody></table></div>
    <div id="c1" class="content"><table><tbody id="t1"></tbody></table></div>
    <div id="c2" class="content"><table><tbody id="t2"></tbody></table></div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        function tab(i) {
            document.querySelectorAll('.tab, .content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab')[i].classList.add('active');
            document.getElementById('c'+i).classList.add('active');
        }
        db.collection("deposits").where("status", "==", "pending").onSnapshot(snap => {
            let h = "<tr><th>Email</th><th>Tiền</th><th>Action</th></tr>";
            snap.forEach(doc => { h += `<tr><td>${doc.data().email}</td><td>${doc.data().amount}</td><td><button onclick="approve('${doc.id}','${doc.data().uid}',${doc.data().amount})">Duyệt</button></td></tr>`; });
            document.getElementById('t0').innerHTML = h;
        });
        async function approve(id, uid, amt) {
            const ref = db.collection("users").doc(uid);
            await db.runTransaction(async t => {
                const u = await t.get(ref);
                t.update(ref, { balance: (u.data().balance || 0) + amt });
                t.update(db.collection("deposits").doc(id), { status: "done" });
            });
            alert("Đã cộng tiền!");
        }
        db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
            let h = "<tr><th>Email</th><th>Tiền</th><th>Thông tin</th><th>Action</th></tr>";
            snap.forEach(doc => { h += `<tr><td>${doc.data().email}</td><td>${doc.data().amount}</td><td>${doc.data().bankInfo}</td><td><button style="background:orange" onclick="db.collection('withdrawals').doc('${doc.id}').update({status:'done'})">Xong</button></td></tr>`; });
            document.getElementById('t1').innerHTML = h;
        });
        db.collection("users").onSnapshot(snap => {
            let h = "<tr><th>Email</th><th>Số dư</th></tr>";
            snap.forEach(doc => { h += `<tr><td>${doc.data().email}</td><td>${doc.data().balance}</td></tr>`; });
            document.getElementById('t2').innerHTML = h;
        });
    </script>
</body>
</html>
