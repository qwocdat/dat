<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        h1 { color: #007aff; text-align: center; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 10px; }
        .tab-btn { padding: 10px 20px; background: #e0e0e0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #007aff; color: #fff; }
        .content { display: none; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-approve { background: #28a745; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-done { background: #ffc107; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .error-msg { color: red; font-weight: bold; text-align: center; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>BẢNG ĐIỀU KHIỂN ADMIN</h1>
    <div id="errorBox" class="error-msg"></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(0)">1. Duyệt Nạp Tiền</button>
        <button class="tab-btn" onclick="switchTab(1)">2. Xử Lý Rút Tiền</button>
        <button class="tab-btn" onclick="switchTab(2)">3. Danh Sách User</button>
    </div>

    <div id="tab0" class="content active">
        <h3>Các đơn nạp tiền đang chờ:</h3>
        <table>
            <thead><tr><th>Email Khách</th><th>Số Tiền</th><th>Hành Động</th></tr></thead>
            <tbody id="depositBody"><tr><td colspan="3">Đang tải dữ liệu...</td></tr></tbody>
        </table>
    </div>

    <div id="tab1" class="content">
        <h3>Các yêu cầu rút tiền:</h3>
        <table>
            <thead><tr><th>Email Khách</th><th>Số Tiền</th><th>Thông Tin Nhận Tiền</th><th>Hành Động</th></tr></thead>
            <tbody id="withdrawBody"><tr><td colspan="4">Đang tải dữ liệu...</td></tr></tbody>
        </table>
    </div>

    <div id="tab2" class="content">
        <h3>Tất cả thành viên:</h3>
        <table>
            <thead><tr><th>Email Khách</th><th>Số Dư Hiện Tại</th></tr></thead>
            <tbody id="userBody"><tr><td colspan="2">Đang tải dữ liệu...</td></tr></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showError(msg) {
            const errBox = document.getElementById('errorBox');
            errBox.innerText = "LỖI: " + msg + " (Hãy kiểm tra lại quyền Database Rules trong Firebase)";
            errBox.style.display = "block";
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            document.getElementById('tab' + index).classList.add('active');
        }

        // 1. Tải Nạp Tiền
        db.collection("deposits").where("status", "==", "pending").onSnapshot(snap => {
            const tbody = document.getElementById('depositBody');
            tbody.innerHTML = "";
            if(snap.empty) return tbody.innerHTML = "<tr><td colspan='3'>Không có đơn nạp nào.</td></tr>";
            
            snap.forEach(doc => {
                const data = doc.data();
                tbody.innerHTML += `<tr>
                    <td>${data.email}</td>
                    <td style="color:green; font-weight:bold">+${data.amount.toLocaleString('vi-VN')}đ</td>
                    <td><button class="btn-approve" onclick="approveDeposit('${doc.id}', '${data.uid}', ${data.amount})">✔ Duyệt (Cộng tiền)</button></td>
                </tr>`;
            });
        }, error => showError(error.message));

        async function approveDeposit(docId, uid, amount) {
            if(!confirm("Xác nhận bạn ĐÃ NHẬN ĐƯỢC TIỀN và muốn cộng vào tài khoản khách?")) return;
            try {
                const userRef = db.collection("users").doc(uid);
                await db.runTransaction(async t => {
                    const uDoc = await t.get(userRef);
                    const currentBal = uDoc.data().balance || 0;
                    t.update(userRef, { balance: currentBal + amount });
                    t.update(db.collection("deposits").doc(docId), { status: "completed" });
                });
                alert("Đã cộng tiền cho khách thành công!");
            } catch (err) { alert("Lỗi khi duyệt: " + err.message); }
        }

        // 2. Tải Rút Tiền
        db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
            const tbody = document.getElementById('withdrawBody');
            tbody.innerHTML = "";
            if(snap.empty) return tbody.innerHTML = "<tr><td colspan='4'>Không có lệnh rút nào.</td></tr>";
            
            snap.forEach(doc => {
                const data = doc.data();
                tbody.innerHTML += `<tr>
                    <td>${data.email}</td>
                    <td style="color:red; font-weight:bold">-${data.amount.toLocaleString('vi-VN')}đ</td>
                    <td>${data.bankInfo}</td>
                    <td><button class="btn-done" onclick="completeWithdraw('${doc.id}')">Đã chuyển khoản xong</button></td>
                </tr>`;
            });
        }, error => showError(error.message));

        async function completeWithdraw(docId) {
            if(!confirm("Bạn đã chuyển tiền cho khách xong chưa?")) return;
            try {
                await db.collection("withdrawals").doc(docId).update({ status: "completed" });
                alert("Đã lưu lịch sử rút tiền!");
            } catch(err) { alert("Lỗi: " + err.message); }
        }

        // 3. Tải danh sách Users
        db.collection("users").onSnapshot(snap => {
            const tbody = document.getElementById('userBody');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                tbody.innerHTML += `<tr><td>${data.email}</td><td style="font-weight:bold">${(data.balance || 0).toLocaleString('vi-VN')}đ</td></tr>`;
            });
        }, error => showError(error.message));
    </script>
</body>
</html>
