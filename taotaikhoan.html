<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palantir - Đăng ký tài khoản</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-container {
      max-width: 500px;
      width: 100%;
    }

    .register-box {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-weight: 500;
      z-index: 1000;
    }

    .notification.success { background: #00b894; }
    .notification.error { background: #ff4757; }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-box">
      <div class="logo">PALANTIR</div>
      <h2>Đăng ký tài khoản</h2>
      
      <form id="registerForm">
        <div class="input-group">
          <label>Họ và tên</label>
          <input type="text" id="fullname" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="input-group">
          <label>Số điện thoại</label>
          <input type="tel" id="phone" required>
        </div>

        <div class="input-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" required>
        </div>

        <div class="input-group">
          <label>Mã giới thiệu (nếu có)</label>
          <input type="text" id="referralCode">
        </div>

        <button type="submit" class="btn" id="registerBtn">
          Đăng ký ngay - Nhận 30.000đ
        </button>
      </form>

      <div class="login-link">
        Đã có tài khoản? <a href="dangnhap.html">Đăng nhập</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // Cấu hình Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8",
      authDomain: "kiemtien-849fa.firebaseapp.com",
      projectId: "kiemtien-849fa",
      storageBucket: "kiemtien-849fa.firebasestorage.app",
      messagingSenderId: "517559162898",
      appId: "1:517559162898:web:62d21294ce080da26ba0cb"
    };

    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Bắt sự kiện submit form
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('registerBtn');
      const originalText = btn.innerText;
      
      // Lấy dữ liệu từ form
      const fullname = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const referralCode = document.getElementById('referralCode').value;

      // Validation cơ bản
      if (!fullname || !email || !phone || !password) {
        alert('Vui lòng điền đầy đủ thông tin');
        return;
      }

      if (password.length < 6) {
        alert('Mật khẩu phải có ít nhất 6 ký tự');
        return;
      }

      // Hiển thị loading
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Đang xử lý...';

      try {
        // Tạo tài khoản Firebase Auth
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Tạo mã giới thiệu cho user mới
        const newReferralCode = 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();

        // Lưu thông tin vào Firestore
        await db.collection('users').doc(user.uid).set({
          fullname: fullname,
          email: email,
          phone: phone,
          referralCode: newReferralCode,
          referredBy: referralCode || null,
          balance: 30000,
          invested: 0,
          referralEarnings: 0,
          referredCount: 0,
          createdAt: new Date().toISOString()
        });

        // Nếu có mã giới thiệu, thưởng cho người giới thiệu
        if (referralCode) {
          const referrerSnapshot = await db.collection('users')
            .where('referralCode', '==', referralCode.toUpperCase())
            .get();

          if (!referrerSnapshot.empty) {
            const referrerDoc = referrerSnapshot.docs[0];
            await db.collection('users').doc(referrerDoc.id).update({
              referredCount: firebase.firestore.FieldValue.increment(1),
              referralEarnings: firebase.firestore.FieldValue.increment(15000),
              balance: firebase.firestore.FieldValue.increment(15000)
            });
          }
        }

        alert('Đăng ký thành công!');
        window.location.href = 'dangnhap.html';

      } catch (error) {
        console.error('Lỗi:', error);
        
        // Xử lý lỗi
        let errorMessage = 'Đăng ký thất bại: ';
        switch(error.code) {
          case 'auth/email-already-in-use':
            errorMessage += 'Email đã được sử dụng';
            break;
          case 'auth/invalid-email':
            errorMessage += 'Email không hợp lệ';
            break;
          case 'auth/weak-password':
            errorMessage += 'Mật khẩu quá yếu';
            break;
          default:
            errorMessage += error.message;
        }
        
        alert(errorMessage);
        
        // Khôi phục nút
        btn.disabled = false;
        btn.innerText = originalText;
      }
    });
  </script>
</body>
  </html>
