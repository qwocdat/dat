<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palantir - Tạo tài khoản</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .input-group input.error {
      border-color: #ff4757;
    }

    .error-message {
      color: #ff4757;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin: 20px 0;
    }

    .checkbox-group input {
      width: auto;
      margin-right: 10px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      color: #666;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .password-strength {
      margin-top: 10px;
      height: 5px;
      background: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }

    .strength-text {
      font-size: 0.85rem;
      margin-top: 5px;
      color: #666;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-weight: 500;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }

    .notification.success {
      background: #00b894;
    }

    .notification.error {
      background: #ff4757;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass-card">
      <div class="logo">PALANTIR</div>
      <h2>Tạo tài khoản mới</h2>
      
      <form id="registerForm">
        <div class="input-group">
          <label for="fullname">Họ và tên</label>
          <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
          <div class="error-message" id="fullname-error"></div>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="example@email.com" required>
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="input-group">
          <label for="phone">Số điện thoại</label>
          <input type="tel" id="phone" placeholder="0987654321" required>
          <div class="error-message" id="phone-error"></div>
        </div>

        <div class="input-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required>
          <div class="password-strength">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
          <div class="error-message" id="password-error"></div>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
          <div class="error-message" id="confirm-error"></div>
        </div>

        <div class="input-group">
          <label for="referralCode">Mã giới thiệu (nếu có)</label>
          <input type="text" id="referralCode" placeholder="Nhập mã giới thiệu">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">Tôi đồng ý với <a href="#" style="color: #667eea;">Điều khoản dịch vụ</a> và <a href="#" style="color: #667eea;">Chính sách bảo mật</a></label>
        </div>

        <button type="submit" class="btn" id="registerBtn">
          <span id="btnText">Đăng ký ngay - Nhận 30.000đ</span>
          <span id="btnLoading" style="display: none;">
            <span class="loading"></span> Đang xử lý...
          </span>
        </button>
      </form>

      <div class="login-link">
        Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // Cấu hình Firebase - ĐÃ CẬP NHẬT
    const firebaseConfig = {
      apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8",
      authDomain: "kiemtien-849fa.firebaseapp.com",
      databaseURL: "https://kiemtien-849fa-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kiemtien-849fa",
      storageBucket: "kiemtien-849fa.firebasestorage.app",
      messagingSenderId: "517559162898",
      appId: "1:517559162898:web:62d21294ce080da26ba0cb",
      measurementId: "G-E2KX4Y92MY"
    };

    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // DOM elements
    const form = document.getElementById('registerForm');
    const fullname = document.getElementById('fullname');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const referralCode = document.getElementById('referralCode');
    const terms = document.getElementById('terms');
    const registerBtn = document.getElementById('registerBtn');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');

    // Kiểm tra mã giới thiệu từ URL
    function getReferralFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const ref = urlParams.get('ref');
      if (ref) {
        referralCode.value = ref;
      }
    }

    // Hiển thị thông báo
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);

      setTimeout(() => {
        notification.remove();
      }, 3000);
    }

    // Kiểm tra độ mạnh mật khẩu
    function checkPasswordStrength(password) {
      let strength = 0;
      let strengthText = '';
      let strengthColor = '';

      if (password.length >= 6) strength += 20;
      if (password.length >= 8) strength += 20;
      if (/[A-Z]/.test(password)) strength += 20;
      if (/[0-9]/.test(password)) strength += 20;
      if (/[^A-Za-z0-9]/.test(password)) strength += 20;

      if (strength <= 20) {
        strengthText = 'Yếu';
        strengthColor = '#ff4757';
      } else if (strength <= 40) {
        strengthText = 'Trung bình';
        strengthColor = '#ffa502';
      } else if (strength <= 60) {
        strengthText = 'Khá';
        strengthColor = '#3498db';
      } else if (strength <= 80) {
        strengthText = 'Tốt';
        strengthColor = '#00b894';
      } else {
        strengthText = 'Rất tốt';
        strengthColor = '#00cec9';
      }

      return { strength, strengthText, strengthColor };
    }

    // Cập nhật thanh độ mạnh mật khẩu
    password.addEventListener('input', () => {
      const { strength, strengthText, strengthColor } = checkPasswordStrength(password.value);
      const strengthBar = document.getElementById('strengthBar');
      const strengthTextEl = document.getElementById('strengthText');
      
      strengthBar.style.width = strength + '%';
      strengthBar.style.background = strengthColor;
      strengthTextEl.textContent = `Độ mạnh: ${strengthText}`;
    });

    // Validate form
    function validateForm() {
      let isValid = true;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /(84|0[3|5|7|8|9])+([0-9]{8})\b/;

      // Reset errors
      document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));

      // Validate fullname
      if (fullname.value.trim().length < 2) {
        showError('fullname', 'Họ tên phải có ít nhất 2 ký tự');
        isValid = false;
      }

      // Validate email
      if (!emailRegex.test(email.value)) {
        showError('email', 'Email không hợp lệ');
        isValid = false;
      }

      // Validate phone
      if (!phoneRegex.test(phone.value)) {
        showError('phone', 'Số điện thoại không hợp lệ');
        isValid = false;
      }

      // Validate password
      if (password.value.length < 6) {
        showError('password', 'Mật khẩu phải có ít nhất 6 ký tự');
        isValid = false;
      }

      // Validate confirm password
      if (password.value !== confirmPassword.value) {
        showError('confirm', 'Mật khẩu xác nhận không khớp');
        isValid = false;
      }

      // Validate terms
      if (!terms.checked) {
        showNotification('Vui lòng đồng ý với điều khoản dịch vụ', 'error');
        isValid = false;
      }

      return isValid;
    }

    function showError(field, message) {
      const errorEl = document.getElementById(`${field}-error`);
      const inputEl = document.getElementById(field);
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      inputEl.classList.add('error');
    }

    // Tạo mã giới thiệu ngẫu nhiên
    function generateReferralCode() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = '';
      for (let i = 0; i < 8; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }

    // Xử lý đăng ký
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!validateForm()) return;

      // Disable button, show loading
      registerBtn.disabled = true;
      btnText.style.display = 'none';
      btnLoading.style.display = 'inline-block';

      try {
        // Tạo user với email và password
        const userCredential = await auth.createUserWithEmailAndPassword(email.value, password.value);
        const user = userCredential.user;

        // Cập nhật profile
        await user.updateProfile({
          displayName: fullname.value.trim()
        });

        // Tạo mã giới thiệu cho user mới
        const newReferralCode = generateReferralCode();

        // Lưu thông tin user vào Firestore
        const userData = {
          uid: user.uid,
          fullname: fullname.value.trim(),
          email: email.value,
          phone: phone.value,
          referralCode: newReferralCode,
          referredBy: referralCode.value || null,
          balance: 30000,
          invested: 0,
          referralEarnings: 0,
          referredCount: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection('users').doc(user.uid).set(userData);

        // Nếu có mã giới thiệu, cập nhật cho người giới thiệu
        if (referralCode.value) {
          const referrerQuery = await db.collection('users')
            .where('referralCode', '==', referralCode.value.toUpperCase())
            .get();

          if (!referrerQuery.empty) {
            const referrerDoc = referrerQuery.docs[0];
            
            // Cập nhật số lượng và tiền thưởng cho người giới thiệu
            await db.collection('users').doc(referrerDoc.id).update({
              referredCount: firebase.firestore.FieldValue.increment(1),
              referralEarnings: firebase.firestore.FieldValue.increment(15000),
              balance: firebase.firestore.FieldValue.increment(15000)
            });

            // Tạo transaction record
            await db.collection('transactions').add({
              userId: referrerDoc.id,
              type: 'referral_bonus',
              amount: 15000,
              description: `Thưởng giới thiệu cho user ${user.uid}`,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
        }

        // Tạo transaction record cho user mới
        await db.collection('transactions').add({
          userId: user.uid,
          type: 'welcome_bonus',
          amount: 30000,
          description: 'Thưởng đăng ký tài khoản mới',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showNotification('Đăng ký thành công! Đang chuyển hướng...', 'success');

        // Chuyển hướng sau 2 giây
        setTimeout(() => {
          window.location.href = 'index.html?registered=true';
        }, 2000);

      } catch (error) {
        console.error('Registration error:', error);
        
        let errorMessage = 'Đăng ký thất bại. Vui lòng thử lại.';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMessage = 'Email này đã được đăng ký.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Email không hợp lệ.';
            break;
          case 'auth/operation-not-allowed':
            errorMessage = 'Phương thức đăng ký chưa được kích hoạt.';
            break;
          case 'auth/weak-password':
            errorMessage = 'Mật khẩu quá yếu.';
            break;
        }
        
        showNotification(errorMessage, 'error');

        // Re-enable button
        registerBtn.disabled = false;
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      }
    });

    // Kiểm tra referral code từ URL khi load trang
    getReferralFromUrl();

    // Auto redirect nếu đã đăng nhập
    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
  </html>
