<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Rút Tiền</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        button { background: #ff3b30; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>RÚT TIỀN</h2>
    <input type="text" id="bankInfo" placeholder="Ngân hàng - STK - Tên">
    <input type="number" id="amount" placeholder="Số tiền muốn rút">
    <button id="btnWithdraw" onclick="rut()">XÁC NHẬN RÚT</button>
    <button style="background: #333;" onclick="history.back()">Quay lại</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function rut() {
            const btn = document.getElementById('btnWithdraw');
            const bank = document.getElementById('bankInfo').value;
            const amt = parseInt(document.getElementById('amount').value);
            const user = auth.currentUser;

            if(!bank || !amt || amt < 30000) return alert("Vui lòng nhập đúng thông tin và tối thiểu 30k!");
            
            btn.disabled = true;
            btn.innerText = "Đang gửi yêu cầu...";

            try {
                const userRef = db.collection("users").doc(user.uid);
                await db.runTransaction(async (t) => {
                    const doc = await t.get(userRef);
                    const bal = doc.data().balance || 0;
                    if(bal < amt) throw "Số dư không đủ!";
                    t.update(userRef, { balance: bal - amt });
                    t.set(db.collection("withdrawals").doc(), { 
                        uid: user.uid, email: user.email, amount: amt, bank: bank, status: "pending", createdAt: new Date() 
                    });
                });
                alert("Đã gửi yêu cầu rút tiền!");
                location.href='index.html';
            } catch(e) { 
                alert("Lỗi: " + e); 
                btn.disabled = false;
                btn.innerText = "XÁC NHẬN RÚT";
            }
        }
    </script>
</body>
</html>
