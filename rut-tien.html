<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rút tiền</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        input, select, button { width: 100%; padding: 15px; border-radius: 12px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; outline: none; box-sizing: border-box; }
        .btn { background: #fff; color: #000; border: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="glass">
        <h2 style="color:#ff3b30">RÚT TIỀN</h2>
        <p>Số dư: <b id="b">0đ</b></p>
        <label style="font-size:12px; opacity:0.6">Chọn ngân hàng:</label>
        <select id="bank">
            <option>MB Bank</option><option>Vietcombank</option><option>VP Bank</option><option>Agribank</option><option>Momo</option>
        </select>
        <input id="acc" placeholder="Số tài khoản nhận">
        <input id="name" placeholder="Tên chủ tài khoản (KHÔNG DẤU)">
        <input id="amt" type="number" placeholder="Số tiền rút (Tối thiểu 30.000)">
        <button class="btn" onclick="draw()">Gửi lệnh rút tiền</button>
        <button onclick="location.href='index.html'" style="background:none; border:none; color:#fff">Quay lại</button>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWmWDcd5clMX287C8o3D2RSWbqWiwxeV8", authDomain: "kiemtien-849fa.firebaseapp.com", projectId: "kiemtien-849fa", storageBucket: "kiemtien-849fa.appspot.com", messagingSenderId: "517559162898", appId: "1:517559162898:web:9d08f0c0450c7ed76ba0cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let uBal, uid, email;
        firebase.auth().onAuthStateChanged(u => {
            if(!u) return;
            uid = u.uid; email = u.email;
            db.collection("users").doc(uid).onSnapshot(d => {
                uBal = d.data().balance;
                document.getElementById('b').innerText = uBal.toLocaleString() + "đ";
            });
        });
        async function draw() {
            const a = parseInt(document.getElementById('amt').value);
            const b = document.getElementById('bank').value;
            const ac = document.getElementById('acc').value;
            const n = document.getElementById('name').value;
            if(a < 30000) return alert("Rút tối thiểu 30,000đ");
            if(a > uBal) return alert("Số dư không đủ");
            if(!ac || !n) return alert("Vui lòng điền đủ STK và Tên");
            await db.runTransaction(async t => {
                t.update(db.collection("users").doc(uid), { balance: uBal - a });
                t.set(db.collection("withdrawals").doc(), { uid, email, amount: a, bankInfo: `${b} | ${ac} | ${n}`, status: "pending", createdAt: new Date() });
            });
            alert("Lệnh rút đã được gửi!");
            location.href = "index.html";
        }
    </script>
</body>
</html>
